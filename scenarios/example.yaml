# Roleplay scenario configuration
# ================================
# Copy this file, rename it, and edit to define your own simulation.
# Private copies ending in .local.yaml are gitignored.
#
# Run with:
#   uv run roleplay run scenarios/example.yaml
#   uv run roleplay run scenarios/example.yaml --provider mock
#   uv run roleplay run scenarios/example.yaml --provider gemini

description: "A small town drama: the sheriff, the mayor, and Martha the shopkeeper"

session_id: "example-001"

# ---------------------------------------------------------------------------
# Simulation settings
# ---------------------------------------------------------------------------
config:
  default_provider: gemini
  default_model: gemini-3.5-flash
  max_episodes: 5
  context_window_episodes: 5
  memory_max_entries: 20
  environment_reactive: true
  goal: "The town reaches a decision on whether to hold the annual festival this year"

# ---------------------------------------------------------------------------
# Named environments (locations parties can move between)
# Parties declare their current location via a 'location' state key.
# Only parties sharing a location interact in the same turn.
# A party can propose STATE: location=<id> to move.
# ---------------------------------------------------------------------------
environments:
  - id: town_square
    name: "Town Square"
    description: >
      A busy public space at the centre of Millhaven. Conversations here are
      overheard by anyone present. The notice board is visible from here.
    state:
      "notice_board": "Festival planning meeting — Town Hall, Thursday"

  - id: town_hall
    name: "Town Hall"
    description: >
      The formal seat of local government. The mayor presides. Proceedings
      are on the record. A large table dominates the room.

  - id: general_store
    name: "General Store"
    description: >
      Run by Martha. Stocked with everyday goods and local gossip. Rumours
      spread here faster than anywhere else in town.
    state:
      "open": true

# ---------------------------------------------------------------------------
# Parties
# ---------------------------------------------------------------------------
parties:
  - id: sheriff
    kind: person
    name: "Sheriff Cole"
    persona:
      description: "A no-nonsense sheriff who keeps the peace and speaks plainly"
      goals:
        - "Maintain order during the festival decision process"
        - "Make sure any decision is safe and enforceable"
      traits: [direct, cautious, fair]
      knowledge:
        - "Last year's festival had minor incidents that strained his department"
      constraints:
        - "Cannot commit additional deputies without the mayor's approval"
    state:
      location: town_square      # starts in the town square

  - id: mayor
    kind: person
    name: "Mayor Rivera"
    persona:
      description: "An ambitious mayor balancing community spirit with budget pressures"
      goals:
        - "Make a decision on the festival that satisfies both merchants and residents"
        - "Protect the town's reputation"
      traits: [diplomatic, politically savvy, indecisive under pressure]
      knowledge:
        - "The festival generates roughly 20% of annual merchant revenue"
        - "The town budget is tight this year"
      constraints:
        - "Needs consensus before committing public funds"
    state:
      location: town_hall        # starts in the town hall

  - id: martha
    kind: person
    name: "Martha"
    persona:
      description: "The general store owner — a sharp-tongued community pillar who hears everything"
      goals:
        - "Ensure the festival goes ahead (it's great for business)"
        - "Keep the community informed and united"
      traits: [sharp, warm, gossipy, resourceful]
      knowledge:
        - "Half the town owes her a favour"
        - "She already has festival stock on order"
      constraints:
        - "Cannot leave the store unattended for long"
    state:
      location: general_store    # starts in her store

  - id: town
    kind: environment
    name: "Millhaven"
    persona:
      description: >
        A small farming town of 800 people in rural New England, late autumn.
        The community is close-knit, proud of its traditions, and wary of
        outside interference.
      knowledge:
        - "The annual harvest festival has run for 40 consecutive years"
        - "This year a drought reduced farm yields by 30%"
        - "A competing event in the next county is scheduled the same weekend"
    state:
      "time.simulated": "Monday morning, week before the festival decision deadline"
      "weather.condition": "overcast, light drizzle"
      "event.active": "pre-festival tension"
