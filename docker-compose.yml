# Docker Compose for local Roleplay API development
# Usage: docker compose up
version: "3.9"

services:
  api:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite database between container restarts
      - roleplay_data:/data
    environment:
      # Set to enable API key auth; omit to run without auth (dev only)
      - ROLEPLAY_API_KEY=${ROLEPLAY_API_KEY:-}
      # LLM provider API keys (optional — required for non-mock providers)
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  roleplay_data:
    driver: local
